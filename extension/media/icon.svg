<!-- Marketplace gallery icon source. Re-render to media/icon.png at 128x128
     (headless Chrome: --screenshot --window-size=128,128). The activity-bar
     icon is the monochrome chapter-review.svg; this is the same glyph on a
     tile so the two read as one product. -->
<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#4338ca"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="128" height="128" rx="27" fill="url(#bg)"/>
  <g fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
    <rect x="40" y="30" width="48" height="68" rx="7"/>
    <circle cx="53" cy="48" r="3.2" fill="#ffffff" stroke="none"/>
    <line x1="61" y1="48" x2="77" y2="48"/>
    <circle cx="53" cy="64" r="3.2" fill="#ffffff" stroke="none"/>
    <line x1="61" y1="64" x2="77" y2="64"/>
    <circle cx="53" cy="80" r="3.2" fill="#ffffff" stroke="none"/>
    <line x1="61" y1="80" x2="77" y2="80"/>
  </g>
</svg>
