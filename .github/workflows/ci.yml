name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  contract:
    name: Contract + validator
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
      - name: Validator regression tests
        run: npm test
      - name: Portability check (skill runs standalone, no node_modules)
        run: |
          cp -r .claude/skills/chapter-review "$RUNNER_TEMP/skill"
          cd "$RUNNER_TEMP/skill"
          node validate.mjs example-chapters.json

  extension:
    name: Extension build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: extension
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: extension/package-lock.json
      - run: npm ci
      - name: Type-check and compile
        run: npm run compile
      - name: Package .vsix (build verification)
        run: npm run package
